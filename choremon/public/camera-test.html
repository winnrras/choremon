<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Camera Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: system-ui; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 20px; }
    video { width: 100%; max-width: 480px; border-radius: 12px; background: #111; }
    button { padding: 14px 32px; background: #818cf8; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; touchAction: manipulation; }
    #status { font-size: 14px; color: #64748b; text-align: center; }
    #error { font-size: 13px; color: #f87171; text-align: center; display: none; }
  </style>
</head>
<body>
  <p id="status">Tap the button to start camera</p>
  <video id="video" autoplay playsinline muted></video>
  <button onclick="startCam()">Start Camera</button>
  <p id="error"></p>

  <script>
    async function startCam() {
      const status = document.getElementById("status");
      const errEl  = document.getElementById("error");
      status.textContent = "Requesting camera...";
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        document.getElementById("video").srcObject = stream;
        status.textContent = "✅ Camera working!";
      } catch(e) {
        status.textContent = "❌ Camera failed";
        errEl.style.display = "block";
        errEl.textContent = e.name + ": " + e.message;
      }
    }
  </script>
</body>
</html>
