<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Choremon Vacuum</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:system-ui,sans-serif; overflow:hidden; height:100vh; width:100vw; touch-action:none; }

    #video {
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover; display:block;
    }

    #draw-canvas {
      position:fixed; inset:0;
      z-index:10; touch-action:none;
    }

    /* Vacuum reticle — hidden until vacuuming phase */
    #reticle {
      position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      z-index:30; pointer-events:none;
      display:none;
    }
    #reticle-outer {
      width:110px; height:110px; border-radius:50%;
      border:2px solid rgba(129,140,248,0.5);
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      animation:pulse 1.4s ease-in-out infinite;
    }
    #reticle-inner {
      width:56px; height:56px; border-radius:50%;
      background:rgba(0,0,0,0.75);
      border:3px solid #818cf8;
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      display:flex; align-items:center; justify-content:center;
      font-size:24px;
      box-shadow:0 0 20px rgba(129,140,248,0.6);
    }

    /* HUD */
    #hud {
      position:fixed; top:0; left:0; right:0; z-index:40;
      background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);
      padding:18px 20px 40px;
      display:flex; justify-content:space-between; align-items:flex-start;
    }
    .hud-chore { color:#fff; font-size:16px; font-weight:700; margin:0 0 2px; }
    .hud-sub   { color:rgba(255,255,255,0.5); font-size:12px; margin:0; }
    #xp-display   { font-size:26px; font-weight:900; margin:0; text-align:right; }
    #coverage-pct { color:rgba(255,255,255,0.5); font-size:12px; margin:0; text-align:right; }

    /* Bottom toolbar */
    #toolbar {
      position:fixed; bottom:24px; left:0; right:0;
      z-index:40; display:flex; justify-content:center; gap:12px; padding:0 20px;
    }
    .tool-btn {
      flex:1; max-width:160px; padding:13px;
      border-radius:14px; border:none;
      font-size:14px; font-weight:700; cursor:pointer;
      color:#fff; touch-action:manipulation;
    }
    #btn-undo { background:rgba(255,255,255,0.15); }
    #btn-confirm { background:#818cf8; display:none; }
    #btn-reset { background:rgba(255,255,255,0.15); display:none; }

    /* Instructions */
    #instructions {
      position:fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:40; pointer-events:none;
    }
    #instructions span {
      display:inline-block;
      background:rgba(0,0,0,0.7);
      border-radius:20px; padding:9px 18px;
      color:#fff; font-size:13px;
    }

    /* Progress bar */
    #progress-track {
      position:fixed; bottom:0; left:0; right:0;
      height:5px; background:rgba(255,255,255,0.1); z-index:40;
    }
    #progress-fill {
      height:100%; width:0%;
      transition:width 0.15s ease; border-radius:2px;
    }

    /* Minimap */
    #minimap-wrap {
      position:fixed; bottom:90px; right:16px;
      z-index:40; background:rgba(0,0,0,0.75);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:12px; padding:8px; display:none;
    }
    #minimap-label { color:rgba(255,255,255,0.4); font-size:9px; text-align:center; margin-bottom:4px; letter-spacing:1px; }
    #minimap { display:block; border-radius:6px; }

    /* Complete */
    #phase-complete {
      display:none; position:fixed; inset:0; z-index:50;
      background:rgba(0,0,0,0.92);
      flex-direction:column; align-items:center; justify-content:center;
      gap:12px; text-align:center; padding:32px;
    }
    #phase-complete.show { display:flex; }
    .complete-xp { font-size:48px; font-weight:900; margin:0; }

    @keyframes pulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6} 50%{transform:translate(-50%,-50%) scale(1.1);opacity:1} }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="draw-canvas"></canvas>

<div id="reticle">
  <div id="reticle-outer"></div>
  <div id="reticle-inner" id="vacuum-emoji">🧹</div>
</div>

<div id="hud">
  <div>
    <p class="hud-chore" id="chore-label">🧹 Vacuuming</p>
    <p class="hud-sub" id="hud-sub">Draw your floor zone</p>
  </div>
  <div>
    <p id="xp-display">0 XP</p>
    <p id="coverage-pct"></p>
  </div>
</div>

<div id="instructions"><span id="inst-text">👆 Tap floor corners to draw zone</span></div>

<div id="toolbar">
  <button class="tool-btn" id="btn-undo"    onclick="undo()">↩ Undo</button>
  <button class="tool-btn" id="btn-confirm" onclick="confirmZone()">✓ Start Cleaning</button>
  <button class="tool-btn" id="btn-reset"   onclick="resetAll()">↺ Redraw</button>
</div>

<div id="minimap-wrap">
  <p id="minimap-label">FLOOR MAP</p>
  <canvas id="minimap" width="110" height="110"></canvas>
</div>

<div id="progress-track"><div id="progress-fill"></div></div>

<div id="phase-complete">
  <div style="font-size:64px">🏆</div>
  <h2 style="color:#fff;font-size:26px;margin:0">Quest Complete!</h2>
  <p style="color:#94a3b8;font-size:14px;margin:0" id="complete-sub">Floor cleared</p>
  <p class="complete-xp" id="complete-xp">+0 XP</p>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const CLOSE_RADIUS   = 30;   // px — how close to first point to close shape
  const GRID_SIZE      = 24;   // cells for coverage tracking
  const XP_PER_CELL    = 4;
  const COMPLETE_THRESH = 0.78;
  const VACUUM_RADIUS  = 55;   // px — how wide the vacuum sweeps

  const params    = new URLSearchParams(window.location.search);
  const choreType = params.get("chore") || "vacuum";
  const CHORES = {
    vacuum: { label:"Vacuuming", emoji:"🧹", color:"#818cf8" },
    mop:    { label:"Mopping",   emoji:"🪣", color:"#38bdf8" },
    sweep:  { label:"Sweeping",  emoji:"🫧", color:"#34d399" },
  };
  const chore = CHORES[choreType] || CHORES.vacuum;

  // Apply theme
  document.getElementById("chore-label").textContent  = `${chore.emoji} ${chore.label}`;
  document.getElementById("xp-display").style.color   = chore.color;
  document.getElementById("progress-fill").style.background = chore.color;
  document.getElementById("reticle-outer").style.borderColor = chore.color + "88";
  document.getElementById("reticle-inner").style.borderColor = chore.color;
  document.getElementById("reticle-inner").style.boxShadow   = `0 0 20px ${chore.color}88`;
  document.getElementById("reticle-inner").textContent       = chore.emoji;
  document.getElementById("complete-xp").style.color         = chore.color;
  document.getElementById("complete-sub").textContent        = `${chore.label} done`;

  // ── State ───────────────────────────────────────────────────────────────────
  let phase      = "drawing"; // drawing | vacuuming | done
  let points     = [];        // [{x,y}] — drawn polygon points
  let zoneClosed = false;
  let coverGrid  = [];        // bool[] — which cells are covered
  let totalXP    = 0;

  // Gyro
  let gyroGamma = 0; // left-right -90..90
  let gyroBeta  = 0; // front-back -180..180
  let gyroReady = false;

  // Canvas
  const canvas = document.getElementById("draw-canvas");
  const ctx    = canvas.getContext("2d");

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    redraw();
  }
  window.addEventListener("resize", resize);
  resize();

  // ── Camera ──────────────────────────────────────────────────────────────────
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment", width:{ideal:1280}, height:{ideal:720} }
  }).then(s => { document.getElementById("video").srcObject = s; });

  // ── Touch input ──────────────────────────────────────────────────────────────
  canvas.addEventListener("pointerdown", (e) => {
    if (phase !== "drawing") return;
    e.preventDefault();

    const x = e.clientX, y = e.clientY;

    // Check if closing the shape
    if (points.length >= 3) {
      const dx = x - points[0].x, dy = y - points[0].y;
      if (Math.hypot(dx, dy) < CLOSE_RADIUS) {
        closeZone();
        return;
      }
    }

    if (!zoneClosed) {
      points.push({ x, y });
      redraw();
      updateDrawUI();
    }
  });

  // ── Drawing ──────────────────────────────────────────────────────────────────
  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (points.length === 0) return;

    // Fill if closed
    if (zoneClosed) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      points.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
      ctx.closePath();
      ctx.fillStyle = chore.color + "33";
      ctx.fill();
    }

    // Draw lines
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    points.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    if (zoneClosed) ctx.closePath();
    ctx.strokeStyle = chore.color;
    ctx.lineWidth   = 2.5;
    ctx.setLineDash(zoneClosed ? [] : [8, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw points
    points.forEach((p, i) => {
      // Outer ring
      ctx.beginPath();
      ctx.arc(p.x, p.y, i === 0 ? 14 : 8, 0, Math.PI * 2);
      ctx.strokeStyle = chore.color;
      ctx.lineWidth   = 2;
      ctx.stroke();
      // Inner dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, i === 0 ? 6 : 4, 0, Math.PI * 2);
      ctx.fillStyle = chore.color;
      ctx.fill();
      // Close hint on first point when enough points
      if (i === 0 && points.length >= 3 && !zoneClosed) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, CLOSE_RADIUS, 0, Math.PI * 2);
        ctx.strokeStyle = chore.color + "44";
        ctx.lineWidth   = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });

    // Draw covered cells during vacuuming
    if (phase === "vacuuming") drawCoverage();
  }

  function drawCoverage() {
    const bbox  = getZoneBBox();
    const cellW = bbox.w / GRID_SIZE;
    const cellH = bbox.h / GRID_SIZE;

    for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
      if (!coverGrid[i]) continue;
      const col = i % GRID_SIZE;
      const row = Math.floor(i / GRID_SIZE);
      const x   = bbox.x + col * cellW;
      const y   = bbox.y + row * cellH;
      ctx.fillStyle = chore.color + "55";
      ctx.fillRect(x, y, cellW, cellH);
    }
  }

  // ── Zone management ──────────────────────────────────────────────────────────
  function closeZone() {
    zoneClosed = true;
    coverGrid  = new Array(GRID_SIZE * GRID_SIZE).fill(false);
    redraw();
    document.getElementById("btn-confirm").style.display = "block";
    document.getElementById("btn-undo").style.display    = "none";
    document.getElementById("inst-text").textContent     = "✓ Tap 'Start Cleaning' when ready";
  }

  function getZoneBBox() {
    const xs = points.map(p => p.x), ys = points.map(p => p.y);
    const x  = Math.min(...xs), y = Math.min(...ys);
    return { x, y, w: Math.max(...xs) - x, h: Math.max(...ys) - y };
  }

  function pointInZone(px, py) {
    // Ray casting
    let inside = false;
    for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
      const xi = points[i].x, yi = points[i].y;
      const xj = points[j].x, yj = points[j].y;
      if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  }

  function screenToCell(sx, sy) {
    const bbox = getZoneBBox();
    const col  = Math.floor((sx - bbox.x) / bbox.w * GRID_SIZE);
    const row  = Math.floor((sy - bbox.y) / bbox.h * GRID_SIZE);
    if (col < 0 || col >= GRID_SIZE || row < 0 || row >= GRID_SIZE) return -1;
    return row * GRID_SIZE + col;
  }

  function cellToScreen(idx) {
    const bbox  = getZoneBBox();
    const col   = idx % GRID_SIZE;
    const row   = Math.floor(idx / GRID_SIZE);
    const cellW = bbox.w / GRID_SIZE;
    const cellH = bbox.h / GRID_SIZE;
    return {
      x: bbox.x + col * cellW + cellW / 2,
      y: bbox.y + row * cellH + cellH / 2,
    };
  }

  // ── Confirm → start vacuuming ────────────────────────────────────────────────
  function confirmZone() {
    phase = "vacuuming";
    document.getElementById("btn-confirm").style.display  = "none";
    document.getElementById("btn-reset").style.display    = "block";
    document.getElementById("reticle").style.display      = "flex";
    document.getElementById("minimap-wrap").style.display = "block";
    document.getElementById("hud-sub").textContent        = "Sweep phone over the zone";
    document.getElementById("inst-text").textContent      = "🧹 Move phone to vacuum each area";

    initGyro();
    startVacuumLoop();
  }

  // ── Gyroscope ────────────────────────────────────────────────────────────────
  function initGyro() {
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      DeviceOrientationEvent.requestPermission().then(r => {
        if (r === "granted") listenGyro();
      });
    } else {
      listenGyro();
    }
  }

  function listenGyro() {
    window.addEventListener("deviceorientation", (e) => {
      if (e.beta !== null) {
        gyroBeta  = e.beta  || 0;
        gyroGamma = e.gamma || 0;
        gyroReady = true;
      }
    }, true);
  }

  // Map gyro to screen position within the drawn zone
  function gyroToScreen() {
    const bbox = getZoneBBox();

    // gamma: -90..90 → maps to zone X
    const nx = (Math.max(-70, Math.min(70, gyroGamma)) + 70) / 140;
    // beta: 20..160 → maps to zone Y (pointing down = floor)
    const ny = (Math.max(20, Math.min(160, gyroBeta)) - 20) / 140;

    return {
      x: bbox.x + nx * bbox.w,
      y: bbox.y + ny * bbox.h,
    };
  }

  // ── Vacuum loop ───────────────────────────────────────────────────────────────
  function startVacuumLoop() {
    setInterval(() => {
      if (phase !== "vacuuming" || !gyroReady) return;

      const pos = gyroToScreen();

      // Only collect if inside zone
      if (!pointInZone(pos.x, pos.y)) return;

      // Mark cells under vacuum radius as covered
      const bbox  = getZoneBBox();
      const cellW = bbox.w / GRID_SIZE;
      const cellH = bbox.h / GRID_SIZE;
      let anyNew  = false;

      for (let row = 0; row < GRID_SIZE; row++) {
        for (let col = 0; col < GRID_SIZE; col++) {
          const idx = row * GRID_SIZE + col;
          if (coverGrid[idx]) continue;
          const cx = bbox.x + col * cellW + cellW / 2;
          const cy = bbox.y + row * cellH + cellH / 2;
          const dist = Math.hypot(cx - pos.x, cy - pos.y);
          if (dist < VACUUM_RADIUS && pointInZone(cx, cy)) {
            coverGrid[idx] = true;
            anyNew = true;
          }
        }
      }

      if (anyNew) {
        updateVacuumHUD();
        redraw();
        drawMinimap();
      }
    }, 80);
  }

  // ── Coverage HUD ─────────────────────────────────────────────────────────────
  function updateVacuumHUD() {
    // Only count cells inside zone
    let inside = 0, covered = 0;
    const bbox  = getZoneBBox();
    const cellW = bbox.w / GRID_SIZE;
    const cellH = bbox.h / GRID_SIZE;

    for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
      const col = i % GRID_SIZE, row = Math.floor(i / GRID_SIZE);
      const cx  = bbox.x + col * cellW + cellW / 2;
      const cy  = bbox.y + row * cellH + cellH / 2;
      if (!pointInZone(cx, cy)) continue;
      inside++;
      if (coverGrid[i]) covered++;
    }

    const ratio = inside > 0 ? covered / inside : 0;
    const pct   = Math.round(ratio * 100);
    totalXP     = covered * XP_PER_CELL;

    document.getElementById("xp-display").textContent    = `${totalXP} XP`;
    document.getElementById("coverage-pct").textContent  = `${pct}% covered`;
    document.getElementById("progress-fill").style.width = `${pct}%`;

    if (ratio >= COMPLETE_THRESH && phase === "vacuuming") {
      phase = "done";
      setTimeout(showComplete, 600);
    }
  }

  // ── Minimap ──────────────────────────────────────────────────────────────────
  function drawMinimap() {
    const c    = document.getElementById("minimap");
    const mctx = c.getContext("2d");
    const cw   = c.width / GRID_SIZE;
    const ch   = c.height / GRID_SIZE;
    const bbox = getZoneBBox();
    const cellW = bbox.w / GRID_SIZE;
    const cellH = bbox.h / GRID_SIZE;

    mctx.fillStyle = "#0f172a";
    mctx.fillRect(0, 0, c.width, c.height);

    for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
      const col = i % GRID_SIZE, row = Math.floor(i / GRID_SIZE);
      const cx  = bbox.x + col * cellW + cellW / 2;
      const cy  = bbox.y + row * cellH + cellH / 2;
      if (!pointInZone(cx, cy)) continue;

      mctx.fillStyle = coverGrid[i] ? chore.color + "cc" : "#1e293b";
      mctx.fillRect(col * cw, row * ch, cw - 0.5, ch - 0.5);
    }

    // Draw zone outline on minimap
    if (points.length > 1) {
      mctx.beginPath();
      const scaleX = (p) => (p.x - bbox.x) / bbox.w * c.width;
      const scaleY = (p) => (p.y - bbox.y) / bbox.h * c.height;
      mctx.moveTo(scaleX(points[0]), scaleY(points[0]));
      points.slice(1).forEach(p => mctx.lineTo(scaleX(p), scaleY(p)));
      mctx.closePath();
      mctx.strokeStyle = chore.color + "88";
      mctx.lineWidth   = 1;
      mctx.stroke();
    }

    // Current position dot
    if (gyroReady && phase === "vacuuming") {
      const pos = gyroToScreen();
      const mx  = (pos.x - bbox.x) / bbox.w * c.width;
      const my  = (pos.y - bbox.y) / bbox.h * c.height;
      mctx.fillStyle = "#fff";
      mctx.beginPath();
      mctx.arc(mx, my, 3, 0, Math.PI * 2);
      mctx.fill();
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function undo() {
    if (points.length > 0) {
      points.pop();
      zoneClosed = false;
      document.getElementById("btn-confirm").style.display = "none";
      document.getElementById("btn-undo").style.display    = "block";
      redraw();
      updateDrawUI();
    }
  }

  function resetAll() {
    phase      = "drawing";
    points     = [];
    zoneClosed = false;
    coverGrid  = [];
    totalXP    = 0;
    document.getElementById("reticle").style.display       = "none";
    document.getElementById("minimap-wrap").style.display  = "none";
    document.getElementById("btn-reset").style.display     = "none";
    document.getElementById("btn-undo").style.display      = "block";
    document.getElementById("btn-confirm").style.display   = "none";
    document.getElementById("xp-display").textContent      = "0 XP";
    document.getElementById("coverage-pct").textContent    = "";
    document.getElementById("progress-fill").style.width   = "0%";
    document.getElementById("hud-sub").textContent         = "Draw your floor zone";
    document.getElementById("inst-text").textContent       = "👆 Tap floor corners to draw zone";
    redraw();
  }

  function updateDrawUI() {
    if (points.length === 0) {
      document.getElementById("inst-text").textContent = "👆 Tap floor corners to draw zone";
    } else if (points.length < 3) {
      document.getElementById("inst-text").textContent = `${points.length} point${points.length>1?"s":""} — keep tapping`;
    } else if (!zoneClosed) {
      document.getElementById("inst-text").textContent = "Tap near ● first point to close zone";
    }
  }

  function showComplete() {
    document.getElementById("complete-xp").textContent = `+${totalXP} XP`;
    document.getElementById("phase-complete").classList.add("show");
    sessionStorage.setItem("choreResult", JSON.stringify({ xp: totalXP, choreType }));
    setTimeout(() => window.history.back(), 3000);
  }

  // Minimap redraw loop
  setInterval(() => { if (phase === "vacuuming") drawMinimap(); }, 200);
</script>
</body>
</html>
