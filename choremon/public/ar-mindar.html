<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Choremon AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: system-ui, sans-serif; background: #000; }

      #vacuum {
        position: fixed; left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        z-index: 100; pointer-events: none;
        display: flex; align-items: center; justify-content: center;
      }
      #vacuum-ring {
        position: absolute; width: 140px; height: 140px;
        border-radius: 50%; border: 2px solid rgba(129,140,248,0.6);
        animation: suctionRing 1.2s ease-out infinite;
      }
      #vacuum-body {
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(0,0,0,0.8); border: 3px solid #818cf8;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; box-shadow: 0 0 24px rgba(129,140,248,0.6);
        position: relative; z-index: 1;
      }
      #hud {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        background: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent);
        padding: 18px 20px 36px;
        display: flex; justify-content: space-between; align-items: flex-start;
      }
      .hud-label { color: #fff; font-size: 16px; font-weight: 700; margin: 0 0 2px; }
      .hud-sub   { color: rgba(255,255,255,0.5); font-size: 12px; margin: 0; }
      #xp-display { font-size: 26px; font-weight: 900; margin: 0; text-align: right; color: #818cf8; }
      #orb-count  { color: rgba(255,255,255,0.5); font-size: 12px; margin: 0; text-align: right; }
      #progress-track {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 5px; background: rgba(255,255,255,0.1); z-index: 100;
      }
      #progress-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s ease; background: #818cf8; }
      #scanning {
        position: fixed; top: 55%; left: 0; right: 0;
        text-align: center; z-index: 100;
      }
      #scanning span {
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(0,0,0,0.72); border-radius: 20px; padding: 10px 20px;
        color: #fff; font-size: 14px;
      }
      .scan-dot { width: 8px; height: 8px; border-radius: 50%; animation: blink 1s ease-in-out infinite; }
      .float-xp {
        position: fixed; font-size: 22px; font-weight: 900;
        pointer-events: none; z-index: 200;
        text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        animation: floatUp 0.85s ease-out forwards;
        transform: translate(-50%, -50%);
      }
      #complete {
        display: none; position: fixed; inset: 0; z-index: 300;
        background: rgba(0,0,0,0.9);
        flex-direction: column; align-items: center; justify-content: center;
        text-align: center; gap: 8px;
      }
      #complete.show { display: flex; }
      #complete h2 { color: #fff; font-size: 28px; margin: 0; }
      #complete .sub { color: #94a3b8; font-size: 15px; margin: 0; }
      #complete .xp-big { font-size: 48px; font-weight: 900; margin: 0; }
      #debug {
        position: fixed; bottom: 8px; left: 0; right: 0;
        background: rgba(0,0,0,0.75); color: #34d399;
        font-size: 11px; font-family: monospace;
        padding: 6px 12px; max-height: 80px; overflow-y: auto; z-index: 9999;
      }
      #debug p { margin: 1px 0; }

      @keyframes suctionRing { 0% { transform:scale(0.4); opacity:0.9; } 100% { transform:scale(1.3); opacity:0; } }
      @keyframes floatUp { 0% { opacity:1; transform:translate(-50%,-50%); } 100% { opacity:0; transform:translate(-50%,-220%); } }
      @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
    </style>
  </head>
  <body>

    <a-scene
      mindar-image="imageTargetSrc: /targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <!-- rotation="-90 0 0" flattens orbs onto the floor plane -->
        <a-entity id="orb-container" rotation="-90 0 0"></a-entity>
      </a-entity>
    </a-scene>

    <div id="hud">
      <div>
        <p class="hud-label" id="chore-label">🧹 Vacuuming</p>
        <p class="hud-sub">Walk over orbs to collect</p>
      </div>
      <div>
        <p id="xp-display">0 XP</p>
        <p id="orb-count">–</p>
      </div>
    </div>

    <div id="vacuum">
      <div id="vacuum-ring"></div>
      <div id="vacuum-body">🧹</div>
    </div>

    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>

    <div id="scanning">
      <span>
        <span class="scan-dot" id="scan-dot"></span>
        Point at the target card on the floor
      </span>
    </div>

    <div id="complete">
      <div style="font-size:72px">🏆</div>
      <h2>Quest Complete!</h2>
      <p class="sub" id="complete-sub">Floor cleared</p>
      <p class="xp-big" id="complete-xp">+0 XP</p>
    </div>

    <div id="debug"><p>⏳ Loading...</p></div>

    <script>
      const XP_PER_ORB           = 5;
      const ORB_COUNT            = 30;
      const COLLECT_RADIUS_PX    = 80;
      const SUCK_MS              = 350;
      const COMPLETION_THRESHOLD = 0.75;
      const MIN_RADIUS           = 0.3;
      const MAX_RADIUS           = 1.8;

      const params    = new URLSearchParams(window.location.search);
      const choreType = params.get("chore") || "vacuum";
      const CHORES = {
        vacuum: { label: "Vacuuming", emoji: "🧹", color: "#818cf8" },
        mop:    { label: "Mopping",   emoji: "🪣", color: "#38bdf8" },
        sweep:  { label: "Sweeping",  emoji: "🫧", color: "#34d399" },
      };
      const chore = CHORES[choreType] || CHORES.vacuum;

      document.getElementById("chore-label").textContent        = `${chore.emoji} ${chore.label}`;
      document.getElementById("vacuum-body").textContent         = chore.emoji;
      document.getElementById("vacuum-body").style.borderColor   = chore.color;
      document.getElementById("vacuum-body").style.boxShadow     = `0 0 24px ${chore.color}77`;
      document.getElementById("vacuum-ring").style.borderColor   = `${chore.color}88`;
      document.getElementById("xp-display").style.color          = chore.color;
      document.getElementById("progress-fill").style.background  = chore.color;
      document.getElementById("scan-dot").style.background       = chore.color;
      document.getElementById("complete-xp").style.color         = chore.color;
      document.getElementById("complete-sub").textContent        = `${chore.label} done`;

      let orbs = [], totalXP = 0, completed = false, orbsPlaced = false;

      function log(msg) {
        const d = document.getElementById("debug");
        const p = document.createElement("p");
        p.textContent = new Date().toLocaleTimeString() + " — " + msg;
        d.appendChild(p);
        d.scrollTop = d.scrollHeight;
      }

      function placeOrbs() {
        if (orbsPlaced) return;
        orbsPlaced = true;
        log("🎯 Placing " + ORB_COUNT + " orbs on floor...");
        document.getElementById("scanning").style.display = "none";

        const container = document.getElementById("orb-container");

        orbs = Array.from({ length: ORB_COUNT }, (_, i) => {
          const angle  = (i / ORB_COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
          const radius = MIN_RADIUS + Math.random() * (MAX_RADIUS - MIN_RADIUS);

          // Because container is rotated -90 on X,
          // X and Y here map to the floor plane (Z is up/down)
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;

          const orbEl = document.createElement("a-cylinder");
          orbEl.setAttribute("position", `${x.toFixed(3)} ${y.toFixed(3)} 0.02`);
          orbEl.setAttribute("radius", "0.08");
          orbEl.setAttribute("height", "0.025");
          orbEl.setAttribute("material",
            `color: ${chore.color}; emissive: ${chore.color}; emissiveIntensity: 0.6; metalness: 0.2; roughness: 0.3`
          );
          orbEl.setAttribute("animation__float",
            `property: position; ` +
            `from: ${x.toFixed(3)} ${y.toFixed(3)} 0.02; ` +
            `to: ${x.toFixed(3)} ${y.toFixed(3)} 0.07; ` +
            `dur: ${1200 + Math.random() * 800}; dir: alternate; loop: true; easing: easeInOutSine`
          );
          orbEl.setAttribute("animation__pulse",
            `property: material.emissiveIntensity; from: 0.4; to: 0.9; ` +
            `dur: ${800 + Math.random() * 400}; dir: alternate; loop: true; easing: easeInOutSine`
          );
          orbEl.setAttribute("id", `orb-${i}`);
          container.appendChild(orbEl);

          return { id: `orb-${i}`, el: orbEl, collected: false, sucking: false };
        });

        log(`✅ Done — spread ${MIN_RADIUS}–${MAX_RADIUS}m`);
        updateHUD();
        startCollectLoop();
      }

      const sceneEl = document.querySelector("a-scene");

      sceneEl.addEventListener("loaded", () => {
        log("✅ Scene loaded");
        const target = document.querySelector("[mindar-image-target]");
        target.addEventListener("targetFound", () => {
          log("🎯 Target found!");
          setTimeout(placeOrbs, 400);
        });
        target.addEventListener("targetLost", () => log("⚠️ Target lost"));
      });

      sceneEl.addEventListener("renderstart", () => log("✅ Camera rendering"));
      window.addEventListener("error", (e) => log("❌ " + e.message));

      function getScreenPos(orbEl) {
        const obj3D = orbEl.object3D;
        if (!obj3D) return null;
        const camera = sceneEl.camera;
        if (!camera) return null;
        const worldPos = new THREE.Vector3();
        obj3D.getWorldPosition(worldPos);
        const projected = worldPos.clone().project(camera);
        if (projected.z > 1) return null;
        if (Math.abs(projected.x) > 1.5 || Math.abs(projected.y) > 1.5) return null;
        return {
          x: ( projected.x + 1) / 2 * window.innerWidth,
          y: (-projected.y + 1) / 2 * window.innerHeight,
        };
      }

      function startCollectLoop() {
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2;
        function loop() {
          if (completed) return;
          orbs.forEach(orb => {
            if (orb.collected || orb.sucking) return;
            const pos = getScreenPos(orb.el);
            if (!pos) return;
            const dist = Math.hypot(pos.x - cx, pos.y - cy);
            if (dist < COLLECT_RADIUS_PX) {
              orb.sucking = true;
              orb.el.removeAttribute("animation__float");
              orb.el.removeAttribute("animation__pulse");
              orb.el.setAttribute("animation__suck",
                `property: scale; to: 0 0 0; dur: ${SUCK_MS}; easing: easeInCubic`
              );
              spawnFloatXP(pos.x, pos.y);
              setTimeout(() => {
                orb.el.setAttribute("visible", "false");
                orb.collected = true;
                orb.sucking   = false;
                totalXP += XP_PER_ORB;
                updateHUD();
                checkCompletion();
              }, SUCK_MS);
            }
          });
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      }

      function spawnFloatXP(x, y) {
        const el = document.createElement("div");
        el.className   = "float-xp";
        el.textContent = `+${XP_PER_ORB} XP`;
        el.style.left  = x + "px";
        el.style.top   = y + "px";
        el.style.color = chore.color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      function updateHUD() {
        const collected = orbs.filter(o => o.collected).length;
        const total     = orbs.length;
        document.getElementById("xp-display").textContent    = `${totalXP} XP`;
        document.getElementById("orb-count").textContent     = `${collected}/${total} orbs`;
        document.getElementById("progress-fill").style.width = `${total > 0 ? collected / total * 100 : 0}%`;
      }

      function checkCompletion() {
        const collected = orbs.filter(o => o.collected).length;
        if (orbs.length > 0 && collected / orbs.length >= COMPLETION_THRESHOLD) {
          completed = true;
          document.getElementById("complete-xp").textContent = `+${totalXP} XP`;
          document.getElementById("complete").classList.add("show");
          sessionStorage.setItem("choreResult", JSON.stringify({ xp: totalXP, choreType }));
          setTimeout(() => window.history.back(), 2500);
        }
      }

      log("📦 Scripts loaded");
    </script>
  </body>
</html>
