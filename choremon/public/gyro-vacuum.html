<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Choremon Vacuum</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:system-ui,sans-serif; overflow:hidden; height:100vh; width:100vw; }

    #camera-wrap {
      position:fixed; inset:0;
    }
    video {
      width:100%; height:100%;
      object-fit:cover; display:block;
    }

    /* Sweep overlay — green tint on covered areas */
    #sweep-canvas {
      position:fixed; inset:0;
      pointer-events:none; z-index:10;
      opacity:0.35;
    }

    /* Center vacuum reticle */
    #reticle {
      position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      z-index:30; pointer-events:none;
    }
    #reticle-ring {
      width:100px; height:100px;
      border-radius:50%;
      border:2px solid rgba(129,140,248,0.7);
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      animation:pulse 1.4s ease-in-out infinite;
    }
    #reticle-dot {
      width:16px; height:16px;
      border-radius:50%;
      background:#818cf8;
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 0 12px #818cf8;
    }

    /* HUD top */
    #hud {
      position:fixed; top:0; left:0; right:0; z-index:40;
      background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);
      padding:18px 20px 40px;
      display:flex; justify-content:space-between; align-items:flex-start;
    }
    .hud-chore { color:#fff; font-size:16px; font-weight:700; margin:0 0 2px; }
    .hud-sub   { color:rgba(255,255,255,0.5); font-size:12px; margin:0; }
    #xp-display { color:#818cf8; font-size:26px; font-weight:900; margin:0; text-align:right; }
    #coverage-pct { color:rgba(255,255,255,0.5); font-size:12px; margin:0; text-align:right; }

    /* Minimap — Ecovacs style */
    #minimap-wrap {
      position:fixed; bottom:80px; right:16px;
      z-index:40; background:rgba(0,0,0,0.75);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:12px; padding:8px;
    }
    #minimap-label {
      color:rgba(255,255,255,0.4); font-size:9px;
      text-align:center; margin-bottom:4px; letter-spacing:1px;
    }
    #minimap { display:block; border-radius:6px; }

    /* Progress bar */
    #progress-track {
      position:fixed; bottom:0; left:0; right:0;
      height:5px; background:rgba(255,255,255,0.1); z-index:40;
    }
    #progress-fill {
      height:100%; width:0%; background:#818cf8;
      transition:width 0.2s ease; border-radius:2px;
    }

    /* Phase screens */
    #phase-scan, #phase-complete {
      position:fixed; inset:0; z-index:50;
      background:rgba(0,0,0,0.92);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; padding:32px; text-align:center;
    }
    #phase-complete { display:none; }
    .phase-emoji { font-size:64px; }
    .phase-title { color:#f1f5f9; font-size:22px; font-weight:800; margin:0; }
    .phase-sub   { color:#64748b; font-size:14px; margin:0; line-height:1.6; }
    .phase-btn {
      width:100%; padding:16px; border-radius:14px;
      border:none; font-size:17px; font-weight:700;
      cursor:pointer; color:#fff; background:#818cf8;
      touchAction:manipulation; margin-top:8px;
    }

    /* Scan phase — ring animation */
    #scan-ring-wrap {
      position:relative; width:120px; height:120px;
    }
    #scan-ring {
      width:120px; height:120px; border-radius:50%;
      border:3px solid #818cf8;
      position:absolute; top:0; left:0;
      animation:scanRing 1.5s ease-in-out infinite;
    }
    #scan-progress-ring {
      width:120px; height:120px; border-radius:50%;
      position:absolute; top:0; left:0;
    }
    #scan-count {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      color:#fff; font-size:28px; font-weight:900;
    }

    #gyro-warning {
      background:#ef444422; border:1px solid #ef444440;
      color:#fca5a5; padding:10px 14px; border-radius:10px;
      font-size:12px; display:none;
    }

    .complete-xp { font-size:48px; font-weight:900; color:#818cf8; margin:0; }

    @keyframes pulse    { 0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)} }
    @keyframes scanRing { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.12);opacity:1} }
  </style>
</head>
<body>

<!-- Camera -->
<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
</div>

<!-- Sweep overlay canvas -->
<canvas id="sweep-canvas"></canvas>

<!-- Reticle -->
<div id="reticle">
  <div id="reticle-ring"></div>
  <div id="reticle-dot"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div>
    <p class="hud-chore" id="chore-label">🧹 Vacuuming</p>
    <p class="hud-sub">Sweep phone over the floor</p>
  </div>
  <div>
    <p id="xp-display">0 XP</p>
    <p id="coverage-pct">0% covered</p>
  </div>
</div>

<!-- Minimap -->
<div id="minimap-wrap">
  <p id="minimap-label">FLOOR MAP</p>
  <canvas id="minimap" width="100" height="100"></canvas>
</div>

<!-- Progress -->
<div id="progress-track">
  <div id="progress-fill"></div>
</div>

<!-- Scan phase -->
<div id="phase-scan">
  <div id="scan-ring-wrap">
    <div id="scan-ring"></div>
    <canvas id="scan-progress-ring" width="120" height="120"></canvas>
    <span id="scan-count">5</span>
  </div>
  <h2 class="phase-title">Scan the room</h2>
  <p class="phase-sub">
    Slowly pan your phone around the floor.<br/>
    This maps the area you need to clean.
  </p>
  <div id="gyro-warning">
    Gyroscope not detected — tap to allow motion access
  </div>
  <button class="phase-btn" id="start-btn" onclick="startScan()">
    Start Scan
  </button>
</div>

<!-- Complete -->
<div id="phase-complete">
  <div class="phase-emoji">🏆</div>
  <h2 class="phase-title">Quest Complete!</h2>
  <p class="phase-sub" id="complete-sub">Floor cleared</p>
  <p class="complete-xp" id="complete-xp">+0 XP</p>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const GRID_W    = 20;   // grid columns
  const GRID_H    = 20;   // grid rows
  const SCAN_SECS = 6;    // how long scan phase lasts
  const COMPLETE_THRESHOLD = 0.72;
  const XP_PER_CELL = 3;

  const params    = new URLSearchParams(window.location.search);
  const choreType = params.get("chore") || "vacuum";
  const CHORES = {
    vacuum: { label:"Vacuuming", emoji:"🧹", color:"#818cf8" },
    mop:    { label:"Mopping",   emoji:"🪣", color:"#38bdf8" },
    sweep:  { label:"Sweeping",  emoji:"🫧", color:"#34d399" },
  };
  const chore = CHORES[choreType] || CHORES.vacuum;

  // Apply theme
  document.getElementById("chore-label").textContent = `${chore.emoji} ${chore.label}`;
  document.getElementById("xp-display").style.color  = chore.color;
  document.getElementById("progress-fill").style.background = chore.color;
  document.getElementById("reticle-ring").style.borderColor = chore.color + "aa";
  document.getElementById("reticle-dot").style.background   = chore.color;
  document.getElementById("reticle-dot").style.boxShadow    = `0 0 12px ${chore.color}`;
  document.querySelector(".phase-btn").style.background      = chore.color;
  document.getElementById("complete-xp").style.color         = chore.color;
  document.getElementById("complete-sub").textContent        = `${chore.label} done`;

  // ── State ───────────────────────────────────────────────────────────────────
  let phase        = "idle"; // idle | scanning | vacuuming | done
  let gyroAlpha    = 0;  // compass (0-360)
  let gyroBeta     = 0;  // front-back tilt (-180 to 180)
  let gyroGamma    = 0;  // left-right tilt (-90 to 90)
  let gyroReady    = false;
  let scanGrid     = [];  // cells detected during scan
  let coverGrid    = [];  // cells covered during vacuuming
  let totalXP      = 0;
  let scanTimer    = null;
  let scanRemain   = SCAN_SECS;

  // Init grids
  for (let i = 0; i < GRID_W * GRID_H; i++) {
    scanGrid.push(false);
    coverGrid.push(false);
  }

  // ── Camera ──────────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode:"environment", width:{ideal:1280}, height:{ideal:720} }
      });
      document.getElementById("video").srcObject = stream;
    } catch(e) {
      console.error("Camera error:", e);
    }
  }
  startCamera();

  // ── Gyroscope ───────────────────────────────────────────────────────────────
  function initGyro() {
    // iOS 13+ needs permission
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      DeviceOrientationEvent.requestPermission()
        .then(r => {
          if (r === "granted") listenGyro();
          else document.getElementById("gyro-warning").style.display = "block";
        });
    } else {
      listenGyro();
    }
  }

  function listenGyro() {
    window.addEventListener("deviceorientation", (e) => {
      if (e.alpha !== null) {
        gyroAlpha = e.alpha || 0;
        gyroBeta  = e.beta  || 0;
        gyroGamma = e.gamma || 0;
        gyroReady = true;
      }
    }, true);
  }

  // ── Map gyro angles to grid cell ─────────────────────────────────────────────
  // We use gamma (-90 to 90) for X and a combo of beta for Y
  // When phone is pointed at floor (beta ~90), gamma sweeps left/right
  function gyroToCell() {
    // Normalize gamma (-90..90) → 0..1
    const nx = (Math.max(-80, Math.min(80, gyroGamma)) + 80) / 160;
    // Normalize beta (30..150 = floor range) → 0..1
    const ny = (Math.max(30, Math.min(150, gyroBeta)) - 30) / 120;
    const col = Math.floor(nx * GRID_W);
    const row = Math.floor(ny * GRID_H);
    return Math.min(GRID_W - 1, col) + Math.min(GRID_H - 1, row) * GRID_W;
  }

  // ── Scan phase ───────────────────────────────────────────────────────────────
  function startScan() {
    document.getElementById("start-btn").disabled = true;
    document.getElementById("start-btn").textContent = "Scanning...";
    initGyro();
    phase      = "scanning";
    scanRemain = SCAN_SECS;

    // Mark cells during scan
    const scanInterval = setInterval(() => {
      if (!gyroReady) return;
      const cell = gyroToCell();
      // Mark cell + neighbors for smooth coverage
      markNeighbors(scanGrid, cell, 2);
    }, 100);

    // Countdown
    scanTimer = setInterval(() => {
      scanRemain--;
      document.getElementById("scan-count").textContent = scanRemain;
      drawScanRing(1 - scanRemain / SCAN_SECS);

      if (scanRemain <= 0) {
        clearInterval(scanTimer);
        clearInterval(scanInterval);
        startVacuuming();
      }
    }, 1000);
  }

  function drawScanRing(progress) {
    const c   = document.getElementById("scan-progress-ring");
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, 120, 120);
    ctx.beginPath();
    ctx.arc(60, 60, 54, -Math.PI/2, -Math.PI/2 + progress * Math.PI * 2);
    ctx.strokeStyle = chore.color;
    ctx.lineWidth   = 4;
    ctx.lineCap     = "round";
    ctx.stroke();
  }

  // ── Vacuuming phase ──────────────────────────────────────────────────────────
  function startVacuuming() {
    phase = "vacuuming";
    document.getElementById("phase-scan").style.display = "none";

    const scannedCount = scanGrid.filter(Boolean).length;
    if (scannedCount === 0) {
      // Fallback if gyro didn't work — fill whole grid
      scanGrid.fill(true);
    }

    drawMinimap();

    // Coverage loop
    setInterval(() => {
      if (phase !== "vacuuming" || !gyroReady) return;
      const cell = gyroToCell();
      if (scanGrid[cell] && !coverGrid[cell]) {
        markNeighbors(coverGrid, cell, 1);
        updateCoverage();
        drawSweepOverlay();
        drawMinimap();
      }
    }, 80);
  }

  // ── Mark cell + neighbors ────────────────────────────────────────────────────
  function markNeighbors(grid, center, radius) {
    const row = Math.floor(center / GRID_W);
    const col = center % GRID_W;
    for (let dr = -radius; dr <= radius; dr++) {
      for (let dc = -radius; dc <= radius; dc++) {
        const r = row + dr, c = col + dc;
        if (r >= 0 && r < GRID_H && c >= 0 && c < GRID_W) {
          grid[r * GRID_W + c] = true;
        }
      }
    }
  }

  // ── Update coverage HUD ──────────────────────────────────────────────────────
  function updateCoverage() {
    const scanned  = scanGrid.filter(Boolean).length;
    const covered  = coverGrid.filter((v, i) => v && scanGrid[i]).length;
    const ratio    = scanned > 0 ? covered / scanned : 0;
    const pct      = Math.round(ratio * 100);

    totalXP = covered * XP_PER_CELL;
    document.getElementById("xp-display").textContent    = `${totalXP} XP`;
    document.getElementById("coverage-pct").textContent  = `${pct}% covered`;
    document.getElementById("progress-fill").style.width = `${pct}%`;

    if (ratio >= COMPLETE_THRESHOLD) {
      phase = "done";
      setTimeout(showComplete, 500);
    }
  }

  // ── Draw sweep overlay on camera feed ────────────────────────────────────────
  function drawSweepOverlay() {
    const canvas = document.getElementById("sweep-canvas");
    const ctx    = canvas.getContext("2d");
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cw = canvas.width  / GRID_W;
    const ch = canvas.height / GRID_H;

    for (let i = 0; i < GRID_W * GRID_H; i++) {
      if (!coverGrid[i] || !scanGrid[i]) continue;
      const col = i % GRID_W;
      const row = Math.floor(i / GRID_W);
      ctx.fillStyle = chore.color + "55";
      ctx.fillRect(col * cw, row * ch, cw, ch);
    }
  }

  // ── Minimap (Ecovacs style) ──────────────────────────────────────────────────
  function drawMinimap() {
    const canvas = document.getElementById("minimap");
    const ctx    = canvas.getContext("2d");
    const cw     = canvas.width  / GRID_W;
    const ch     = canvas.height / GRID_H;

    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < GRID_W * GRID_H; i++) {
      const col = i % GRID_W;
      const row = Math.floor(i / GRID_W);
      const x   = col * cw;
      const y   = row * ch;

      if (coverGrid[i] && scanGrid[i]) {
        ctx.fillStyle = chore.color + "cc";
        ctx.fillRect(x, y, cw - 0.5, ch - 0.5);
      } else if (scanGrid[i]) {
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(x, y, cw - 0.5, ch - 0.5);
      }
    }

    // Draw current position dot
    if (gyroReady) {
      const cell = gyroToCell();
      const col  = cell % GRID_W;
      const row  = Math.floor(cell / GRID_W);
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(col * cw + cw/2, row * ch + ch/2, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Complete ─────────────────────────────────────────────────────────────────
  function showComplete() {
    document.getElementById("complete-xp").textContent = `+${totalXP} XP`;
    document.getElementById("phase-complete").style.display = "flex";
    sessionStorage.setItem("choreResult", JSON.stringify({ xp: totalXP, choreType }));
    setTimeout(() => window.history.back(), 3000);
  }

  // ── Minimap redraw loop ──────────────────────────────────────────────────────
  setInterval(drawMinimap, 200);

  // ── Resize sweep canvas ──────────────────────────────────────────────────────
  window.addEventListener("resize", drawSweepOverlay);
</script>
</body>
</html>
